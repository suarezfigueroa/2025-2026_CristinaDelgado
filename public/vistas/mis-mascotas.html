<div id="mascotas-container">

    <div class="vista-header">
        <h2 class="vista-titulo">Mis Mascotas</h2>
        <button class="btn-añadir" id="btn-añadir-mascota">+ Añadir mascota</button>
    </div>

    <!-- Las tarjetas de mascotas se generan aquí por JS desde api/mascotas.php -->
    <div id="galeria-mascotas"></div>

</div>

<!-- ********** MODAL FICHA MASCOTA ********** -->
<!-- Se abre al pulsar una tarjeta de la galería -->
<div id="modal-mascota" class="modal-overlay">
    <div class="modal-mascota-contenido">
        <img id="modal-mascota-foto" src="" alt="" class="modal-mascota-img">
        <div class="modal-mascota-info">
            <h2 id="modal-mascota-nombre"></h2>
            <p class="modal-mascota-detalle"><strong>Especie:</strong> <span id="modal-mascota-especie"></span></p>
            <p class="modal-mascota-detalle"><strong>Raza:</strong> <span id="modal-mascota-raza"></span></p>
            <p class="modal-mascota-detalle"><strong>Edad:</strong> <span id="modal-mascota-edad"></span></p>
            <p class="modal-mascota-detalle"><strong>Sexo:</strong> <span id="modal-mascota-sexo"></span></p>
            <div class="modal-mascota-acciones">
                <button class="btn-editar" id="modal-btn-editar" title="Editar">✏️</button>
                <button class="btn-eliminar" id="modal-btn-eliminar" title="Eliminar">🗑️</button>
                <button class="btn-cerrar-modal" id="modal-mascota-cerrar2" title="Cerrar">✕</button>
            </div>

            <!-- El consejo se carga desde api/consejos.php al pulsar el botón -->
            <div class="modal-consejo-section">
                <button class="btn-consejo" id="btn-ver-consejo">🐾 Ver consejo</button>
                <div id="modal-consejo-resultado" class="modal-consejo-resultado oculto"></div>
            </div>
        </div>
    </div>
</div>

<!-- ********** MODAL AÑADIR MASCOTA ********** -->
<div id="modal-anadir" class="modal-overlay">
    <div class="modal-form-contenido">
        <div class="modal-form-header">
            <h2>Nueva Mascota</h2>
            <button id="modal-anadir-cerrar" class="modal-cerrar">&times;</button>
        </div>
        <div class="modal-form-body">
            <div class="form-group">
                <label for="input-nombre">Nombre</label>
                <input type="text" id="input-nombre" placeholder="Nombre de tu mascota" required>
            </div>
            <div class="form-group">
                <label for="input-especie">Especie</label>
                <select id="input-especie">
                    <option value="1">Perro</option>
                    <option value="2">Gato</option>
                </select>
            </div>
            <div class="form-group">
                <label for="input-raza">Raza</label>
                <input type="text" id="input-raza" placeholder="Raza (opcional)">
            </div>
            <div class="form-group">
                <label for="input-edad">Edad (años)</label>
                <input type="number" id="input-edad" min="0" max="30" placeholder="Edad">
            </div>
            <div class="form-group">
                <label for="input-sexo">Sexo</label>
                <select id="input-sexo">
                    <option value="macho">Macho</option>
                    <option value="hembra">Hembra</option>
                </select>
            </div>
            <div class="form-group">
                <label for="input-foto">Foto</label>
                <input type="file" id="input-foto" accept="image/*">
                <!-- La previsualización de la foto se inserta aquí por JS -->
                <div id="preview-foto" class="preview-foto"></div>
            </div>
            <div id="form-mascota-mensaje"></div>
            <button id="btn-guardar-mascota" class="btn-guardar">Guardar mascota</button>
        </div>
    </div>
</div>

<!-- ********** MODAL EDITAR MASCOTA ********** -->
<!-- El id de la mascota se guarda en el campo oculto para enviarlo con PUT -->
<div id="modal-editar" class="modal-overlay">
    <div class="modal-form-contenido">
        <div class="modal-form-header">
            <h2>Editar Mascota</h2>
            <button id="modal-editar-cerrar" class="modal-cerrar">&times;</button>
        </div>
        <div class="modal-form-body">
            <input type="hidden" id="edit-id-mascota">
            <div class="form-group">
                <label for="edit-nombre">Nombre</label>
                <input type="text" id="edit-nombre" required>
            </div>
            <div class="form-group">
                <label for="edit-especie">Especie</label>
                <select id="edit-especie">
                    <option value="1">Perro</option>
                    <option value="2">Gato</option>
                </select>
            </div>
            <div class="form-group">
                <label for="edit-raza">Raza</label>
                <input type="text" id="edit-raza" placeholder="Raza (opcional)">
            </div>
            <div class="form-group">
                <label for="edit-edad">Edad (años)</label>
                <input type="number" id="edit-edad" min="0" max="30">
            </div>
            <div class="form-group">
                <label for="edit-sexo">Sexo</label>
                <select id="edit-sexo">
                    <option value="macho">Macho</option>
                    <option value="hembra">Hembra</option>
                </select>
            </div>
            <div class="form-group">
                <label for="edit-foto">Nueva foto (opcional)</label>
                <input type="file" id="edit-foto" accept="image/*">
                <!-- La previsualización de la foto nueva se inserta aquí por JS -->
                <div id="edit-preview-foto" class="preview-foto"></div>
            </div>
            <div id="edit-mascota-mensaje"></div>
            <button id="btn-actualizar-mascota" class="btn-guardar">Guardar cambios</button>
        </div>
    </div>
</div>
